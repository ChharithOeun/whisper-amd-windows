name: CI -- Validate Scripts

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Syntax check all Python files
        run: |
          python -m py_compile scripts/transcribe.py
          python -m py_compile scripts/benchmark.py
          python -m py_compile scripts/verify_gpu.py
          echo "Syntax OK: all scripts"
      - name: Import check (stdlib only)
        shell: python
        run: |
          import ast, sys, pathlib
          for p in pathlib.Path(".").rglob("*.py"):
              try:
                  ast.parse(p.read_text(encoding="utf-8"))
                  print("AST OK:", p)
              except SyntaxError as e:
                  print("FAIL:", p, e)
                  sys.exit(1)
      - name: Validate YAML files
        run: |
          python -c "
          import glob, yaml, sys
          files = glob.glob('**/*.yml', recursive=True) + glob.glob('**/*.yaml', recursive=True)
          failed = 0
          for f in files:
              try:
                  yaml.safe_load(open(f))
                  print('OK:', f)
              except yaml.YAMLError as e:
                  print('FAIL:', f, e)
                  failed += 1
          sys.exit(failed)
          " || pip install pyyaml && python -c "
          import glob, yaml, sys
          files = glob.glob('**/*.yml', recursive=True) + glob.glob('**/*.yaml', recursive=True)
          failed = 0
          for f in files:
              try:
                  yaml.safe_load(open(f))
                  print('OK:', f)
              except yaml.YAMLError as e:
                  print('FAIL:', f, e)
                  failed += 1
          sys.exit(failed)
          "
